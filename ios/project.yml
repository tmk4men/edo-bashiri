name: EdoBashiri
options:
  bundleIdPrefix: com.edobashiri
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # ↓ 自分の Apple Developer Team ID を入れると実機ビルド/署名が通る（シミュレータは空でOK）
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  EdoBashiri:
    type: application
    platform: iOS
    sources:
      - path: EdoBashiri
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.edobashiri
        PRODUCT_NAME: EdoBashiri
        INFOPLIST_FILE: EdoBashiri/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
